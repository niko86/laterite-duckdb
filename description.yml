extension:
  name: laterite_ags4
  description: Read AGS4 geotechnical data files as typed, UUID-keyed tables directly from SQL â€” born-typed columns, deterministic content-addressed keys that join across groups by construction, and an embedded AGS dictionary. A read-only SQL surface. Local, http(s):// and s3:// (with httpfs).
  version: 0.7.0
  language: Rust
  build: cargo
  license: MIT
  # wasm is BUILT (wasm_mvp / wasm_eh). The C-API extension links against
  # quack-rs's wasm32-unknown-emscripten VFS surface via a staticlib example
  # (src/wasm_lib.rs), linked as an emscripten SIDE_MODULE (.cargo/config.toml);
  # DuckDB-WASM (1.5.4, â‰¥ our 1.5.3 C-API pin) backs the path/remote readers, and
  # read_ags_text + the metadata functions need no filesystem. Browser
  # SQL-over-AGS is also served by the dedicated `laterite-ags4-wasm` package.
  #
  # wasm_threads is excluded: the community build image's emsdk-main has an
  # emcc/binaryen version mismatch â€” emcc feeds wasm-opt "--enable-bulk-memory-opt"
  # (a threads-memory-model flag) that the bundled wasm-opt doesn't recognise
  # ("Unknown option"). Upstream toolchain bug, not our code; mvp/eh are unaffected.
  # (linux_amd64_musl: untested.)
  excluded_platforms: "wasm_threads;linux_amd64_musl"
  requires_toolchains: "rust"
  maintainers:
    - niko86

repo:
  github: niko86/laterite-duckdb
  # Pin to the release commit SHA once the repo is pushed + tagged (community-
  # extensions pins a SHA, not a branch). Placeholder until then:
  ref: REPLACE_WITH_RELEASE_COMMIT_SHA

docs:
  hello_world: |
    -- Read a group as a typed table (columns typed from the file's own TYPE row):
    SELECT loca_id, loca_gl
    FROM read_ags('site.ags', 'LOCA')
    WHERE loca_gl > 50.0;

    -- Join across groups on the deterministic keys â€” no shared state, joins by
    -- construction (every SAMP row's _parent_id equals its LOCA's _id):
    SELECT l.loca_id, s.samp_ref, s.samp_top
    FROM read_ags('site.ags', 'SAMP') s
    JOIN read_ags('site.ags', 'LOCA') l ON s._parent_id = l._id;

    -- Inspect structure + the embedded AGS dictionary:
    SELECT "group", n_rows, parent FROM ags_groups('site.ags') ORDER BY n_rows DESC;
    SELECT child, parent, shared_keys FROM ags_relationships() WHERE parent = 'LOCA';

    -- Remote, lazily (with httpfs):
    -- LOAD httpfs;
    -- SELECT loca_id FROM read_ags('s3://bucket/site.ags', 'LOCA');
  extended_description: |
    `laterite_ags4` reads [AGS4](https://www.ags.org.uk/) geotechnical & geoenvironmental
    data files as first-class DuckDB tables â€” no conversion step, no bundled engine.

    Written in ðŸ¦€ Rust on DuckDB's C Extension API (zero C++).

    ### What it gives you

    - **Born-typed columns** â€” each heading is typed from the file's own `TYPE` row
      (`2DP` â†’ `DOUBLE`, `ID` â†’ `VARCHAR`, `0DP` â†’ `BIGINT`, `YN` â†’ `BOOLEAN`, â€¦).
    - **Deterministic content-addressed keys** â€” every row carries `_id` and
      `_parent_id` (UUIDv8 of the row's spec key-chain). `child._parent_id == parent._id`
      **by construction**, so groups join across independent `read_ags(...)` calls with
      no shared state.
    - **Self-describing metadata** â€” `ags_groups`, `ags_headings`, `ags_dictionary`,
      `ags_relationships` expose the file's structure and the embedded AGS dictionary.
    - **Persistence** â€” `load_ags(path)` emits CREATE-TABLE DDL for an indexed,
      repeat-/remote-query store.
    - **Local or remote** â€” reads go through DuckDB's virtual filesystem, so local paths,
      `http(s)://` and `s3://` (with `LOAD httpfs`) all work on one code path.
    - **Native + wasm** â€” built for every community-extensions platform, DuckDB-WASM
      included: the same reader for native and browser DuckDB.

    ### Functions

    | function | returns |
    |---|---|
    | `read_ags(path, group)` | one group as a typed table â€” `_id`, `_parent_id`, then one column per heading (typed from the file's `TYPE` row). Reads local / `http(s)://` / `s3://`. |
    | `read_ags_text(content, group)` | the same typed table, from an **inline AGS4 string** (no filesystem). |
    | `ags_groups(path)` | `(group, n_rows, n_headings, parent)` â€” the file's group list. |
    | `ags_headings(path)` | `(group, heading, unit, ags_type, sql_type, status, is_key, ordinal)` â€” the per-heading schema, enriched with the dictionary's KEY status. |
    | `ags_dictionary()` | the embedded standard AGS dictionary as a table (`group`, `heading`, `status`, `ags_type`, `unit`, `description`, â€¦). |
    | `ags_relationships()` | `(child, parent, shared_keys)` â€” the spec parentâ†’child graph that `_parent_id` follows. |
    | `load_ags(path)` | `(seq, stmt)` â€” CREATE-TABLE DDL to materialise every group into an indexed, repeat-/remote-queryable store. |

    Readers stream lazily (â‰ˆ2048-row vector chunks); a non-conforming numeric cell becomes
    `NULL`, never an error (the born-typed behaviour). Optional arguments are **named**
    (`edition := '4.2'`, `encoding := 'windows-1252'`), the rest positional. The path verbs
    take an `encoding` named param (e.g. `encoding := 'windows-1252'`) for non-UTF-8
    sources; the `_text` variant is UTF-8 (its input is already a `VARCHAR`). This is a
    **read-only SQL surface** â€” validation, certification and repair stay in the `lat`
    CLI / the `laterite` library.
