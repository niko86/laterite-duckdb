# The wasm SIDE_MODULE link is now owned by extension-ci-tools'
# base.Makefile::link_wasm_release (it runs the emcc link with
# `-sSIDE_MODULE=2 -sEXPORTED_FUNCTIONS=_laterite_ags4_init_c_api`), so we no
# longer set the `-sSIDE_MODULE=2` rustflag here — the native cdylib and the wasm
# staticlib example are separate artifacts and the archive is emcc-linked, not
# cargo-linked.

# Statically link the C runtime on windows (matches the reference extensions).
[target.x86_64-pc-windows-msvc]
rustflags = ["-Ctarget-feature=+crt-static"]
